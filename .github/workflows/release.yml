name: Release

# Push a v* tag (e.g. v0.2.2, v0.2.2-rc1) to trigger builds that
# publish a GitHub Release with the XPI, Windows installer, and Debian package.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create a release

jobs:
  build:
    name: Build & publish (Windows)
    runs-on: windows-latest
    env:
      # Optional GPG signing key (ASCII-armored private key) + its passphrase.
      # When absent, the signing step is skipped and the build still succeeds.
      GPG_PRIVATE_KEY: ${{ secrets.GPG_SIGNING_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            companion/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('companion/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run companion tests
        run: cargo test --manifest-path companion/Cargo.toml --release
        shell: pwsh

      - name: Install NSIS
        # windows-latest ships with Chocolatey pre-installed.
        run: choco install nsis -y --no-progress
        shell: pwsh

      - name: Build XPI + installer
        run: powershell -NoProfile -ExecutionPolicy Bypass -File installer\build.ps1
        shell: pwsh

      - name: Read version from manifest
        id: meta
        run: |
          $manifest = Get-Content extension\manifest.json -Raw | ConvertFrom-Json
          $version  = $manifest.version
          "version=$version"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "xpi=dist/onionrouter-$version.xpi" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "exe=dist/OnionRouter-Setup-$version.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Version $version"
        shell: pwsh

      - name: Generate SHA-256 checksums
        run: |
          $xpi = "${{ steps.meta.outputs.xpi }}"
          $exe = "${{ steps.meta.outputs.exe }}"
          $sums = @()
          foreach ($f in @($xpi, $exe)) {
            $h = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
            $name = Split-Path $f -Leaf
            $sums += "$h  $name"
          }
          $sums -join "`n" | Out-File -FilePath dist/SHA256SUMS.txt -Encoding ascii
          Get-Content dist/SHA256SUMS.txt
        shell: pwsh

      - name: Sign checksums with GPG
        # Skipped automatically when GPG_SIGNING_KEY is not configured.
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          $ErrorActionPreference = "Stop"
          gpg --version | Select-Object -First 1
          # Use the default keyring; the Git-bundled gpg mishandles a Windows
          # GNUPGHOME path. Import the private key via stdin.
          $env:GPG_PRIVATE_KEY | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long
          # Pass the passphrase via a file: dodges shell quoting of special
          # characters and a trailing newline in the secret.
          $pf = Join-Path $env:RUNNER_TEMP "pp.txt"
          [System.IO.File]::WriteAllText($pf, $env:GPG_PASSPHRASE)
          try {
            gpg --batch --yes --pinentry-mode loopback --passphrase-file $pf `
              --armor --detach-sign --output dist/SHA256SUMS.txt.asc dist/SHA256SUMS.txt
          } finally {
            Remove-Item $pf -Force -ErrorAction SilentlyContinue
          }
          gpg --verify dist/SHA256SUMS.txt.asc dist/SHA256SUMS.txt
        shell: pwsh

      - name: Sanity check tag matches manifest version
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $ver = "${{ steps.meta.outputs.version }}"
          if ($tag -ne $ver -and -not $tag.StartsWith("$ver-")) {
            Write-Error "Tag '${{ github.ref_name }}' does not match manifest version '$ver'."
            exit 1
          }
        shell: pwsh

      - name: Detect prerelease
        id: prerelease
        run: |
          $tag = "${{ github.ref_name }}"
          # Anything with a dash (-alpha, -rc1, -beta) OR a v0.* tag is a prerelease.
          if ($tag -match '-' -or $tag -match '^v0\.') {
            "is_prerelease=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "is_prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
        shell: pwsh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.xpi }}
            ${{ steps.meta.outputs.exe }}
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.asc

  linux-deb:
    name: Build Debian package
    needs: build
    runs-on: ubuntu-22.04
    env:
      # Same optional GPG key as the Windows job; skipped when unset.
      GPG_PRIVATE_KEY: ${{ secrets.GPG_SIGNING_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            companion/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('companion/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Debian package
        run: bash installer/linux/build-deb.sh

      - name: Read package metadata
        id: meta
        run: |
          version="$(python3 -c 'import json; print(json.load(open("extension/manifest.json"))["version"])')"
          deb="dist/onionrouter-companion_${version}_amd64.deb"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "deb=$deb" >> "$GITHUB_OUTPUT"
          echo "Version $version"

      - name: Generate Debian SHA-256 checksum
        run: |
          cd dist
          sha256sum "$(basename "${{ steps.meta.outputs.deb }}")" > "$(basename "${{ steps.meta.outputs.deb }}").sha256"
          cat "$(basename "${{ steps.meta.outputs.deb }}").sha256"

      - name: Sign Debian package with GPG
        # Skipped automatically when GPG_SIGNING_KEY is not configured.
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          gpg --version | head -n 1
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long
          # Passphrase via a file: dodges shell quoting and a trailing newline.
          pf="$(mktemp)"
          printf '%s' "$GPG_PASSPHRASE" > "$pf"
          deb="${{ steps.meta.outputs.deb }}"
          gpg --batch --yes --pinentry-mode loopback --passphrase-file "$pf" \
            --armor --detach-sign --output "$deb.asc" "$deb"
          rm -f "$pf"
          gpg --verify "$deb.asc" "$deb"

      - name: Sanity check tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="${{ steps.meta.outputs.version }}"
          if [[ "$tag" != "$ver" && "$tag" != "$ver"-* ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not match manifest version '$ver'." >&2
            exit 1
          fi

      - name: Detect prerelease
        id: prerelease
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ "$tag" == *-* || "$tag" == v0.* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            ${{ steps.meta.outputs.deb }}
            ${{ steps.meta.outputs.deb }}.sha256
            ${{ steps.meta.outputs.deb }}.asc
